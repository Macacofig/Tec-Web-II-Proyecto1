<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Cafresso</title>
    <link rel="stylesheet" href="../styles/css/main.css">
</head>
<body>

    <header class="navbar">
        <nav class="nav" aria-label="Main navigation">
            <div class="nav__logo">
                <a href="index.html">Cafresso</a>
            </div>
            <ul class="nav__list">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Products</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-main">
        <div class="contact-content fade-up"> 
            
            <aside class="contact-left">
                <section class="form-section">
                    <h2>Get in Touch</h2>
                    <p>Share your thoughts with us; your opinion matters and helps us grow the ritual.</p>

                    <div class="form-container">
                        <form id="contact-form" action="#" method="post">
                            <div class="form-group">
                                <label for="name">Full Name</label>
                                <input type="text" id="name" name="name" placeholder="e.g. John Doe" required>
                            </div>

                            <div class="form-group">
                                <label for="email">Email Address</label>
                                <input type="email" id="email" name="email" placeholder="john@example.com" required>
                            </div>

                            <div class="form-group">
                                <label for="reason">Your Message</label>
                                <textarea id="reason" name="message" placeholder="What's on your mind?..." required></textarea>
                            </div>

                            <button type="submit" class="btn-submit">Send Message</button>
                        </form>

                        <div class="form-social">
                            <a href="#" aria-label="Instagram">Instagram</a>
                            <a href="#" aria-label="Twitter">Twitter</a>
                            <a href="#" aria-label="Facebook">Facebook</a>
                        </div>
                    </div>
                </section>
            </aside>

            <section class="contact-right">
                <h2>Community Rituals</h2>
                
                <div class="comments-container" id="comments-list"></div>
            </section>

        </div>
    </main>

    <footer class="footer">
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="services.html">Products</a>
            <a href="contact.html">Contact</a>
        </div>

        <p>&copy; 2026 Cafresso Rituals. All rights reserved.</p>
    </footer>

    <script src="../functions/Contact/contact.js"></script>
    <script src="../functions/Contact/contact-presenter.js"></script>
    <script src="../functions/Home/navbar.js"></script>
</body>
</html>
